<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>建设世界 · 管理后台</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0b0d10;
      color: #eef2f5;
      min-height: 100vh;
      padding: 2rem;
    }
    .container {
      max-width: 1000px;
      margin: 0 auto;
    }
    h1 {
      font-size: 2rem;
      font-weight: 500;
      letter-spacing: 2px;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, #d0e8f5, #7bb3d9);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .subtitle {
      color: rgba(160, 175, 190, 0.5);
      margin-bottom: 2rem;
      font-size: 0.9rem;
    }
    .card {
      background: rgba(16, 24, 32, 0.4);
      border: 1px solid rgba(160, 175, 190, 0.08);
      border-radius: 16px;
      padding: 1.8rem;
      margin-bottom: 2rem;
      backdrop-filter: blur(4px);
    }
    .card h2 {
      font-size: 1.2rem;
      font-weight: 400;
      letter-spacing: 1px;
      color: #b8d0dd;
      margin-bottom: 1.2rem;
    }
    .form-group {
      margin-bottom: 1rem;
    }
    .form-group label {
      display: block;
      font-size: 0.85rem;
      color: rgba(160, 175, 190, 0.6);
      margin-bottom: 0.3rem;
      letter-spacing: 0.5px;
    }
    .form-group input,
    .form-group textarea,
    .form-group select {
      width: 100%;
      padding: 0.7rem 1rem;
      background: rgba(20, 30, 40, 0.4);
      border: 1px solid rgba(160, 175, 190, 0.1);
      border-radius: 10px;
      color: #eef2f5;
      font-size: 0.95rem;
      font-family: inherit;
      transition: 0.2s;
    }
    .form-group input:focus,
    .form-group textarea:focus,
    .form-group select:focus {
      outline: none;
      border-color: #5ab0e0;
      box-shadow: 0 0 20px rgba(90, 176, 224, 0.05);
    }
    .form-group textarea {
      min-height: 100px;
      resize: vertical;
    }
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }
    .btn {
      padding: 0.7rem 2rem;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      transition: 0.2s;
      font-family: inherit;
      letter-spacing: 0.5px;
    }
    .btn-primary {
      background: linear-gradient(135deg, #5ab0e0, #3a8aba);
      color: #fff;
    }
    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 20px rgba(90, 176, 224, 0.2);
    }
    .btn-danger {
      background: rgba(200, 60, 60, 0.2);
      color: #e06060;
      border: 1px solid rgba(200, 60, 60, 0.15);
    }
    .btn-danger:hover {
      background: rgba(200, 60, 60, 0.3);
    }
    .post-list {
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
    }
    .post-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.8rem 1.2rem;
      background: rgba(20, 30, 40, 0.3);
      border: 1px solid rgba(160, 175, 190, 0.04);
      border-radius: 10px;
      transition: 0.2s;
    }
    .post-item:hover {
      border-color: rgba(160, 175, 190, 0.08);
    }
    .post-item .info {
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .post-item .info .title {
      font-weight: 450;
      color: #d0e6f0;
    }
    .post-item .info .meta {
      font-size: 0.8rem;
      color: rgba(160, 175, 190, 0.4);
    }
    .post-item .info .pin-badge {
      font-size: 0.65rem;
      background: rgba(90, 176, 224, 0.12);
      border: 1px solid rgba(90, 176, 224, 0.15);
      color: #5ab0e0;
      padding: 0.05rem 0.6rem;
      border-radius: 12px;
    }
    .post-item .actions {
      display: flex;
      gap: 0.5rem;
    }
    .post-item .actions .btn {
      padding: 0.3rem 0.8rem;
      font-size: 0.8rem;
    }
    .empty-state {
      text-align: center;
      color: rgba(160, 175, 190, 0.2);
      padding: 2rem 0;
      font-size: 0.9rem;
      letter-spacing: 1px;
    }
    .toast {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      padding: 0.8rem 1.5rem;
      border-radius: 12px;
      background: rgba(16, 24, 32, 0.95);
      border: 1px solid rgba(160, 175, 190, 0.1);
      color: #eef2f5;
      font-size: 0.9rem;
      backdrop-filter: blur(10px);
      transform: translateY(100px);
      opacity: 0;
      transition: 0.3s ease;
      z-index: 100;
    }
    .toast.show {
      transform: translateY(0);
      opacity: 1;
    }
    .toast.success {
      border-color: rgba(90, 176, 224, 0.3);
    }
    .toast.error {
      border-color: rgba(200, 60, 60, 0.3);
    }

    /* ===== 密码弹窗遮罩 ===== */
    #authOverlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }
    #authOverlay.hidden {
      display: none;
    }
    .auth-box {
      background: rgba(16, 24, 32, 0.95);
      border: 1px solid rgba(160, 175, 190, 0.1);
      border-radius: 20px;
      padding: 2.5rem 3rem;
      max-width: 400px;
      width: 90%;
      text-align: center;
    }
    .auth-box .lock-icon {
      font-size: 3rem;
      color: #5ab0e0;
      margin-bottom: 1rem;
    }
    .auth-box h2 {
      font-size: 1.4rem;
      font-weight: 400;
      letter-spacing: 2px;
      color: #b8d0dd;
      margin-bottom: 0.5rem;
    }
    .auth-box p {
      color: rgba(160, 175, 190, 0.4);
      font-size: 0.9rem;
      margin-bottom: 1.5rem;
    }
    .auth-box input {
      width: 100%;
      padding: 0.8rem 1rem;
      background: rgba(20, 30, 40, 0.4);
      border: 1px solid rgba(160, 175, 190, 0.1);
      border-radius: 10px;
      color: #eef2f5;
      font-size: 1rem;
      font-family: inherit;
      margin-bottom: 1rem;
      text-align: center;
      letter-spacing: 4px;
    }
    .auth-box input:focus {
      outline: none;
      border-color: #5ab0e0;
    }
    .auth-box .auth-error {
      color: #e06060;
      font-size: 0.85rem;
      margin-bottom: 0.8rem;
      min-height: 1.5rem;
    }
    .auth-box .btn {
      width: 100%;
      padding: 0.8rem;
      font-size: 1rem;
    }

    @media (max-width: 640px) {
      body {
        padding: 1rem;
      }
      .form-row {
        grid-template-columns: 1fr;
      }
      .post-item {
        flex-direction: column;
        align-items: flex-start;
        gap: 0.5rem;
      }
      .post-item .actions {
        width: 100%;
        justify-content: flex-end;
      }
      .auth-box {
        padding: 2rem 1.5rem;
      }
    }
  </style>
</head>
<body>

  <!-- ===== 密码验证弹窗 ===== -->
  <div id="authOverlay">
    <div class="auth-box">
      <div class="lock-icon">🔐</div>
      <h2>管理后台</h2>
      <p>请输入管理员密钥以继续</p>
      <input type="password" id="authInput" placeholder="输入密码" autofocus>
      <div class="auth-error" id="authError"></div>
      <button class="btn btn-primary" id="authBtn">验证身份</button>
    </div>
  </div>

  <!-- ===== 主内容（默认隐藏） ===== -->
  <div id="mainContent" style="display: none;">
    <div class="container">
      <h1>⚙️ 建设世界 · 管理后台</h1>
      <div class="subtitle">管理服务器动态帖子 · 发帖 / 删帖</div>

      <div class="card">
        <h2>📝 发布新动态</h2>
        <form id="postForm">
          <div class="form-row">
            <div class="form-group">
              <label>标题 *</label>
              <input type="text" id="postTitle" placeholder="输入帖子标题" required>
            </div>
            <div class="form-group">
              <label>发布人 *</label>
              <input type="text" id="postAuthor" placeholder="作者名称" required>
            </div>
          </div>
          <div class="form-group">
            <label>内容摘要</label>
            <textarea id="postExcerpt" placeholder="简短摘要（选填）" rows="2"></textarea>
          </div>
          <div class="form-group">
            <label>完整内容</label>
            <textarea id="postContent" placeholder="帖子正文内容" rows="3"></textarea>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>是否置顶</label>
              <select id="postPinned">
                <option value="false">否</option>
                <option value="true">是</option>
              </select>
            </div>
            <div class="form-group" style="display: flex; align-items: flex-end; justify-content: flex-end;">
              <button type="submit" class="btn btn-primary">发布帖子</button>
            </div>
          </div>
        </form>
      </div>

      <div class="card">
        <h2>📋 所有动态</h2>
        <div id="postList" class="post-list">
          <div class="empty-state">加载中...</div>
        </div>
      </div>
    </div>

    <div id="toast" class="toast"></div>
  </div>

  <script>
    // ============================================================
    // 配置
    // ============================================================
    const API_BASE = 'https://jssjapi.你的子域名.workers.dev';
    const ADMIN_KEY = 'jssjapi';

    // ============================================================
    // 密码验证逻辑
    // ============================================================
    const authOverlay = document.getElementById('authOverlay');
    const authInput = document.getElementById('authInput');
    const authBtn = document.getElementById('authBtn');
    const authError = document.getElementById('authError');
    const mainContent = document.getElementById('mainContent');

    function tryLogin() {
      const inputPassword = authInput.value.trim();
      if (inputPassword === ADMIN_KEY) {
        // 密码正确
        authOverlay.classList.add('hidden');
        mainContent.style.display = 'block';
        authError.textContent = '';
        // 加载帖子
        loadPosts();
        // 保存到 localStorage，方便刷新时自动登录
        localStorage.setItem('admin_key', ADMIN_KEY);
      } else {
        authError.textContent = '❌ 密码错误，请重试';
        authInput.value = '';
        authInput.focus();
      }
    }

    // 回车键触发登录
    authInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        tryLogin();
      }
    });

    authBtn.addEventListener('click', tryLogin);

    // 检查 localStorage 是否已有密码
    const savedKey = localStorage.getItem('admin_key');
    if (savedKey === ADMIN_KEY) {
      // 自动登录
      authOverlay.classList.add('hidden');
      mainContent.style.display = 'block';
      loadPosts();
    } else {
      // 显示密码弹窗
      authOverlay.classList.remove('hidden');
      mainContent.style.display = 'none';
      authInput.focus();
    }

    // ============================================================
    // Toast 通知
    // ============================================================
    function showToast(message, type = 'success') {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.className = 'toast ' + type + ' show';
      clearTimeout(toast._timeout);
      toast._timeout = setTimeout(() => {
        toast.classList.remove('show');
      }, 3000);
    }

    // ============================================================
    // 获取管理员密钥（用于 API 请求）
    // ============================================================
    function getAdminKey() {
      return ADMIN_KEY;
    }

    // ============================================================
    // 加载帖子列表
    // ============================================================
    async function loadPosts() {
      try {
        const resp = await fetch(API_BASE + '/api/posts');
        const data = await resp.json();
        const container = document.getElementById('postList');

        if (!data.success || !data.posts || data.posts.length === 0) {
          container.innerHTML = '<div class="empty-state">📭 暂无动态</div>';
          return;
        }

        container.innerHTML = data.posts.map(post => `
          <div class="post-item">
            <div class="info">
              <span class="title">${post.title}</span>
              ${post.pinned ? '<span class="pin-badge">置顶</span>' : ''}
              <span class="meta">${post.author} · ${post.date}</span>
            </div>
            <div class="actions">
              <button class="btn btn-danger" onclick="deletePost('${post.id}')">删除</button>
            </div>
          </div>
        `).join('');
      } catch (err) {
        showToast('加载失败: ' + err.message, 'error');
      }
    }

    // ============================================================
    // 发布帖子
    // ============================================================
    document.getElementById('postForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const title = document.getElementById('postTitle').value.trim();
      const author = document.getElementById('postAuthor').value.trim();
      const excerpt = document.getElementById('postExcerpt').value.trim();
      const content = document.getElementById('postContent').value.trim();
      const pinned = document.getElementById('postPinned').value === 'true';

      if (!title || !author) {
        showToast('标题和发布人为必填项', 'error');
        return;
      }

      const key = getAdminKey();

      try {
        const resp = await fetch(API_BASE + '/api/posts', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + key,
          },
          body: JSON.stringify({ title, author, excerpt, content, pinned }),
        });

        const data = await resp.json();
        if (data.success) {
          showToast('✅ 帖子发布成功！');
          document.getElementById('postForm').reset();
          loadPosts();
        } else {
          showToast('❌ ' + (data.error || '发布失败'), 'error');
        }
      } catch (err) {
        showToast('发布失败: ' + err.message, 'error');
      }
    });

    // ============================================================
    // 删除帖子
    // ============================================================
    window.deletePost = async function(postId) {
      if (!confirm('确定要删除这篇帖子吗？')) return;

      const key = getAdminKey();

      try {
        const resp = await fetch(API_BASE + '/api/posts/' + postId, {
          method: 'DELETE',
          headers: {
            'Authorization': 'Bearer ' + key,
          },
        });

        const data = await resp.json();
        if (data.success) {
          showToast('✅ 帖子已删除');
          loadPosts();
        } else {
          showToast('❌ ' + (data.error || '删除失败'), 'error');
        }
      } catch (err) {
        showToast('删除失败: ' + err.message, 'error');
      }
    };
  </script>
</body>
</html>
