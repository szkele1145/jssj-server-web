<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>建设世界 · 管理后台</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0b0d10;
      color: #eef2f5;
      min-height: 100vh;
      padding: 2rem;
    }
    .container {
      max-width: 1000px;
      margin: 0 auto;
    }
    h1 {
      font-size: 2rem;
      font-weight: 500;
      letter-spacing: 2px;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, #d0e8f5, #7bb3d9);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .subtitle {
      color: rgba(160, 175, 190, 0.5);
      margin-bottom: 2rem;
      font-size: 0.9rem;
    }
    .badge-online {
      display: inline-block;
      background: rgba(90, 176, 224, 0.15);
      border: 1px solid rgba(90, 176, 224, 0.2);
      color: #5ab0e0;
      font-size: 0.7rem;
      padding: 0.1rem 0.8rem;
      border-radius: 20px;
      margin-left: 0.8rem;
      letter-spacing: 0.5px;
      vertical-align: middle;
    }
    .card {
      background: rgba(16, 24, 32, 0.4);
      border: 1px solid rgba(160, 175, 190, 0.08);
      border-radius: 16px;
      padding: 1.8rem;
      margin-bottom: 2rem;
      backdrop-filter: blur(4px);
    }
    .card h2 {
      font-size: 1.2rem;
      font-weight: 400;
      letter-spacing: 1px;
      color: #b8d0dd;
      margin-bottom: 1.2rem;
    }
    .form-group {
      margin-bottom: 1rem;
    }
    .form-group label {
      display: block;
      font-size: 0.85rem;
      color: rgba(160, 175, 190, 0.6);
      margin-bottom: 0.3rem;
      letter-spacing: 0.5px;
    }
    .form-group input,
    .form-group textarea,
    .form-group select {
      width: 100%;
      padding: 0.7rem 1rem;
      background: rgba(20, 30, 40, 0.4);
      border: 1px solid rgba(160, 175, 190, 0.1);
      border-radius: 10px;
      color: #eef2f5;
      font-size: 0.95rem;
      font-family: inherit;
      transition: 0.2s;
    }
    .form-group input:focus,
    .form-group textarea:focus,
    .form-group select:focus {
      outline: none;
      border-color: #5ab0e0;
      box-shadow: 0 0 20px rgba(90, 176, 224, 0.05);
    }
    .form-group textarea {
      min-height: 100px;
      resize: vertical;
    }
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }
    .btn {
      padding: 0.7rem 2rem;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      transition: 0.2s;
      font-family: inherit;
      letter-spacing: 0.5px;
    }
    .btn-primary {
      background: linear-gradient(135deg, #5ab0e0, #3a8aba);
      color: #fff;
    }
    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 20px rgba(90, 176, 224, 0.2);
    }
    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }
    .btn-danger {
      background: rgba(200, 60, 60, 0.2);
      color: #e06060;
      border: 1px solid rgba(200, 60, 60, 0.15);
    }
    .btn-danger:hover {
      background: rgba(200, 60, 60, 0.3);
    }
    .post-list {
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
    }
    .post-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.8rem 1.2rem;
      background: rgba(20, 30, 40, 0.3);
      border: 1px solid rgba(160, 175, 190, 0.04);
      border-radius: 10px;
      transition: 0.2s;
    }
    .post-item:hover {
      border-color: rgba(160, 175, 190, 0.08);
    }
    .post-item .info {
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .post-item .info .title {
      font-weight: 450;
      color: #d0e6f0;
    }
    .post-item .info .meta {
      font-size: 0.8rem;
      color: rgba(160, 175, 190, 0.4);
    }
    .post-item .info .pin-badge {
      font-size: 0.65rem;
      background: rgba(90, 176, 224, 0.12);
      border: 1px solid rgba(90, 176, 224, 0.15);
      color: #5ab0e0;
      padding: 0.05rem 0.6rem;
      border-radius: 12px;
    }
    .post-item .actions {
      display: flex;
      gap: 0.5rem;
    }
    .post-item .actions .btn {
      padding: 0.3rem 0.8rem;
      font-size: 0.8rem;
    }
    .empty-state {
      text-align: center;
      color: rgba(160, 175, 190, 0.2);
      padding: 2rem 0;
      font-size: 0.9rem;
      letter-spacing: 1px;
    }
    .toast {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      padding: 0.8rem 1.5rem;
      border-radius: 12px;
      background: rgba(16, 24, 32, 0.95);
      border: 1px solid rgba(160, 175, 190, 0.1);
      color: #eef2f5;
      font-size: 0.9rem;
      backdrop-filter: blur(10px);
      transform: translateY(100px);
      opacity: 0;
      transition: 0.3s ease;
      z-index: 100;
    }
    .toast.show {
      transform: translateY(0);
      opacity: 1;
    }
    .toast.success {
      border-color: rgba(90, 176, 224, 0.3);
    }
    .toast.error {
      border-color: rgba(200, 60, 60, 0.3);
    }

    #authOverlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }
    #authOverlay.hidden {
      display: none;
    }
    .auth-box {
      background: rgba(16, 24, 32, 0.95);
      border: 1px solid rgba(160, 175, 190, 0.1);
      border-radius: 20px;
      padding: 2.5rem 3rem;
      max-width: 400px;
      width: 90%;
      text-align: center;
    }
    .auth-box .lock-icon {
      font-size: 3rem;
      color: #5ab0e0;
      margin-bottom: 1rem;
    }
    .auth-box h2 {
      font-size: 1.4rem;
      font-weight: 400;
      letter-spacing: 2px;
      color: #b8d0dd;
      margin-bottom: 0.5rem;
    }
    .auth-box p {
      color: rgba(160, 175, 190, 0.4);
      font-size: 0.9rem;
      margin-bottom: 1.5rem;
    }
    .auth-box input {
      width: 100%;
      padding: 0.8rem 1rem;
      background: rgba(20, 30, 40, 0.4);
      border: 1px solid rgba(160, 175, 190, 0.1);
      border-radius: 10px;
      color: #eef2f5;
      font-size: 1rem;
      font-family: inherit;
      margin-bottom: 1rem;
      text-align: center;
      letter-spacing: 4px;
    }
    .auth-box input:focus {
      outline: none;
      border-color: #5ab0e0;
    }
    .auth-box .auth-error {
      color: #e06060;
      font-size: 0.85rem;
      margin-bottom: 0.8rem;
      min-height: 1.5rem;
    }
    .auth-box .btn {
      width: 100%;
      padding: 0.8rem;
      font-size: 1rem;
    }

    @media (max-width: 640px) {
      body {
        padding: 1rem;
      }
      .form-row {
        grid-template-columns: 1fr;
      }
      .post-item {
        flex-direction: column;
        align-items: flex-start;
        gap: 0.5rem;
      }
      .post-item .actions {
        width: 100%;
        justify-content: flex-end;
      }
      .auth-box {
        padding: 2rem 1.5rem;
      }
    }
  </style>
</head>
<body>

  <div id="authOverlay">
    <div class="auth-box">
      <div class="lock-icon">🔐</div>
      <h2>管理后台</h2>
      <p>请输入管理员密钥以继续</p>
      <input type="password" id="authInput" placeholder="输入密码" autofocus>
      <div class="auth-error" id="authError"></div>
      <button class="btn btn-primary" id="authBtn">验证身份</button>
    </div>
  </div>

  <div id="mainContent" style="display: none;">
    <div class="container">
      <h1>
        ⚙️ 建设世界 · 管理后台
        <span class="badge-online">🌐 在线模式</span>
        <button onclick="logout()" style="float:right;background:rgba(200,60,60,.15);border:1px solid rgba(200,60,60,.2);color:#e06060;padding:0.3rem 1rem;border-radius:8px;cursor:pointer;font-size:0.8rem;font-family:inherit;">退出登录</button>
      </h1>
      <div class="subtitle">管理动态 · 投票 · 神人榜</div>

      <div style="display:flex;gap:0.5rem;margin-bottom:1.5rem;flex-wrap:wrap;">
        <button class="tab-btn active" data-tab="posts" onclick="switchTab('posts')" style="flex:1;min-width:80px;padding:0.5rem 1rem;border-radius:10px;border:1px solid rgba(160,175,190,.1);background:rgba(90,176,224,.1);color:#7bb3d9;cursor:pointer;font-family:inherit;font-size:0.85rem;letter-spacing:1px;transition:.2s;">📋 动态</button>
        <button class="tab-btn" data-tab="votes" onclick="switchTab('votes')" style="flex:1;min-width:80px;padding:0.5rem 1rem;border-radius:10px;border:1px solid rgba(160,175,190,.08);background:transparent;color:rgba(160,175,190,.5);cursor:pointer;font-family:inherit;font-size:0.85rem;letter-spacing:1px;transition:.2s;">📊 投票</button>
        <button class="tab-btn" data-tab="stories" onclick="switchTab('stories')" style="flex:1;min-width:80px;padding:0.5rem 1rem;border-radius:10px;border:1px solid rgba(160,175,190,.08);background:transparent;color:rgba(160,175,190,.5);cursor:pointer;font-family:inherit;font-size:0.85rem;letter-spacing:1px;transition:.2s;">👑 神人榜</button>
      </div>

      <!-- 动态 -->
      <div class="tab-content" id="tab-posts">
        <div class="card"><h2>📋 所有动态</h2><div id="postList" class="post-list"><div class="empty-state">加载中...</div></div></div>
        <div class="card">
          <h2>📝 发布新动态</h2>
          <form id="postForm">
            <div class="form-row"><div class="form-group"><label>标题 *</label><input type="text" id="postTitle" placeholder="输入帖子标题" required></div><div class="form-group"><label>发布人 *</label><input type="text" id="postAuthor" placeholder="作者名称" required></div></div>
            <div class="form-group"><label>内容摘要</label><textarea id="postExcerpt" placeholder="简短摘要（选填）" rows="2"></textarea></div>
            <div class="form-group"><label>完整内容</label><textarea id="postContent" placeholder="帖子正文内容" rows="3"></textarea></div>
            <div class="form-row"><div class="form-group"><label>是否置顶</label><select id="postPinned"><option value="false">否</option><option value="true">是</option></select></div><div class="form-group" style="display:flex;align-items:flex-end;justify-content:flex-end;"><button type="submit" class="btn btn-primary">发布帖子</button></div></div>
          </form>
        </div>
      </div>

      <!-- 投票 -->
      <div class="tab-content" id="tab-votes" style="display:none;">
        <div class="card"><h2>📋 所有投票</h2><div id="voteList" class="post-list"><div class="empty-state">加载中...</div></div></div>
        <div class="card">
          <h2>📝 创建新投票</h2>
          <form id="voteForm">
            <div class="form-group"><label>投票标题 *</label><input type="text" id="voteTitle" placeholder="输入投票标题" required></div>
            <div class="form-group"><label>投票描述</label><textarea id="voteDesc" placeholder="描述投票内容" rows="2"></textarea></div>
            <div class="form-row"><div class="form-group"><label>截止日期（选填）</label><input type="date" id="voteDeadline"></div><div class="form-group" style="display:flex;align-items:flex-end;justify-content:flex-end;"><button type="submit" class="btn btn-primary">创建投票</button></div></div>
          </form>
        </div>
      </div>

      <!-- 神人榜 -->
      <div class="tab-content" id="tab-stories" style="display:none;">
        <div class="card"><h2>📋 神人榜</h2><div id="storyList" class="post-list"><div class="empty-state">加载中...</div></div></div>
        <div class="card">
          <h2>📝 添加新记录</h2>
          <form id="storyForm">
            <div class="form-group"><label>标题 *</label><input type="text" id="storyTitle" placeholder="事件标题" required></div>
            <div class="form-group"><label>事件描述 *</label><textarea id="storyText" placeholder="描述事件经过" rows="3" required></textarea></div>
            <div class="form-group"><label>图片链接（可选）</label><textarea id="storyImageUrls" placeholder="图片直链，每行一张（支持 img.remit.ee 图床）" rows="3"></textarea></div>
            <div class="form-row"><div class="form-group"></div><div class="form-group" style="display:flex;align-items:flex-end;justify-content:flex-end;"><button type="submit" class="btn btn-primary">添加记录</button></div></div>
          </form>
        </div>
      </div>

    </div>
    <div id="toast" class="toast"></div>
  </div>

  <!-- 编辑投票弹窗 -->
  <div id="editVoteOverlay" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.8);backdrop-filter:blur(10px);z-index:9999;align-items:center;justify-content:center;">
    <div style="background:rgba(16,24,32,.95);border:1px solid rgba(160,175,190,.1);border-radius:20px;padding:2.5rem;max-width:460px;width:90%;">
      <h2 style="font-size:1.3rem;font-weight:400;letter-spacing:2px;color:#b8d0dd;margin-bottom:1.5rem;">✏️ 编辑投票</h2>
      <div class="form-group"><label>标题</label><input type="text" id="editVoteTitle" style="width:100%;padding:0.7rem 1rem;background:rgba(20,30,40,.4);border:1px solid rgba(160,175,190,.1);border-radius:10px;color:#eef2f5;font-size:0.95rem;font-family:inherit;"></div>
      <div class="form-group"><label>描述</label><textarea id="editVoteDesc" rows="2" style="width:100%;padding:0.7rem 1rem;background:rgba(20,30,40,.4);border:1px solid rgba(160,175,190,.1);border-radius:10px;color:#eef2f5;font-size:0.95rem;font-family:inherit;"></textarea></div>
      <div class="form-group"><label>截止日期</label><input type="date" id="editVoteDeadline" style="width:100%;padding:0.7rem 1rem;background:rgba(20,30,40,.4);border:1px solid rgba(160,175,190,.1);border-radius:10px;color:#eef2f5;font-size:0.95rem;font-family:inherit;color-scheme:dark;"></div>
      <div class="form-row" style="display:flex;gap:0.8rem;margin-top:1.2rem;">
        <button onclick="closeEditVote()" style="flex:1;padding:0.7rem;border-radius:10px;border:1px solid rgba(160,175,190,.1);background:transparent;color:rgba(160,175,190,.5);cursor:pointer;font-family:inherit;font-size:0.95rem;letter-spacing:1px;">取消</button>
        <button onclick="saveEditVote()" style="flex:1;padding:0.7rem;border-radius:10px;border:none;background:linear-gradient(135deg,#5ab0e0,#3a8aba);color:#fff;cursor:pointer;font-family:inherit;font-size:0.95rem;letter-spacing:1px;">保存修改</button>
      </div>
    </div>
  </div>

  <script>
    // ============================================================
    // 配置 - 前端不存密码！
    // ============================================================
    const API_BASE = 'https://api.jssj.cc.cd';

    // ============================================================
    // 密码验证 - 全部走后端
    // ============================================================
    const authOverlay = document.getElementById('authOverlay');
    const authInput = document.getElementById('authInput');
    const authBtn = document.getElementById('authBtn');
    const authError = document.getElementById('authError');
    const mainContent = document.getElementById('mainContent');

    // 用于存储密码（仅在 sessionStorage 中，关闭标签页即销毁）
    let adminPassword = sessionStorage.getItem('admin_pass') || '';

    async function tryLogin() {
      const password = authInput.value.trim();
      if (!password) {
        authError.textContent = '请输入密码';
        return;
      }

      authBtn.disabled = true;
      authBtn.textContent = '验证中...';

      try {
        const resp = await fetch(API_BASE + '/api/auth', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password }),
        });

        const data = await resp.json();

        if (data.success) {
          adminPassword = password;
          sessionStorage.setItem('admin_pass', password);
          authOverlay.classList.add('hidden');
          mainContent.style.display = 'block';
          authError.textContent = '';
          loadPosts();
          loadVotes();
        } else {
          authError.textContent = '❌ ' + (data.error || '密码错误');
          authInput.value = '';
          authInput.focus();
          sessionStorage.removeItem('admin_pass');
        }
      } catch (err) {
        authError.textContent = '❌ 连接服务器失败';
        console.error(err);
      } finally {
        authBtn.disabled = false;
        authBtn.textContent = '验证身份';
      }
    }

    authInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') tryLogin();
    });
    authBtn.addEventListener('click', tryLogin);

    // 检查已有登录
    if (sessionStorage.getItem('admin_pass')) {
      adminPassword = sessionStorage.getItem('admin_pass');
      authOverlay.classList.add('hidden');
      mainContent.style.display = 'block';
      loadPosts();
      loadVotes();
    } else {
      authOverlay.classList.remove('hidden');
      mainContent.style.display = 'none';
      authInput.focus();
    }

    function logout() {
      sessionStorage.removeItem('admin_pass');
      adminPassword = '';
      authOverlay.classList.remove('hidden');
      mainContent.style.display = 'none';
      authInput.value = '';
      authInput.focus();
    }

    // ============================================================
    // Toast 通知
    // ============================================================
    function showToast(message, type = 'success') {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.className = 'toast ' + type + ' show';
      clearTimeout(toast._timeout);
      toast._timeout = setTimeout(() => {
        toast.classList.remove('show');
      }, 3000);
    }

    // ============================================================
    // 获取当前验证状态
    // ============================================================
    function getAuthToken() {
      return adminPassword;
    }

    // ============================================================
    // 加载投票列表
    // ============================================================
    async function loadVotes() {
      const container = document.getElementById('voteList');
      try {
        const resp = await fetch(API_BASE + '/api/votes');
        const data = await resp.json();
        if (!data.success || !data.votes || data.votes.length === 0) {
          container.innerHTML = '<div class="empty-state">📭 暂无投票</div>';
          return;
        }
        container.innerHTML = data.votes.map(v => `
          <div class="post-item">
            <div class="info">
              <span class="title">${v.title}</span>
              <span class="meta">同意 ${v.yesCount} · 反对 ${v.noCount} · ${v.date}${v.deadline ? ' · 截止 ' + v.deadline : ''}</span>
            </div>
            <div class="actions">
              <button class="btn btn-primary" style="padding:0.3rem 0.8rem;font-size:0.8rem;background:rgba(90,176,224,.1);border:1px solid rgba(90,176,224,.15);color:#5ab0e0;" onclick="editVote('${v.id}')">编辑</button>
              <button class="btn btn-danger" onclick="deleteVote('${v.id}')">删除</button>
            </div>
          </div>
        `).join('');
      } catch {
        container.innerHTML = '<div class="empty-state">❌ 加载失败</div>';
      }
    }

    // ============================================================
    // 创建投票
    // ============================================================
    document.getElementById('voteForm')?.addEventListener('submit', async (e) => {
      e.preventDefault();
      const title = document.getElementById('voteTitle').value.trim();
      const description = document.getElementById('voteDesc').value.trim();
      const deadline = document.getElementById('voteDeadline').value || null;
      if (!title) { showToast('标题为必填项', 'error'); return; }
      if (!adminPassword) { showToast('请先登录', 'error'); return; }
      try {
        const resp = await fetch(API_BASE + '/api/votes', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + adminPassword },
          body: JSON.stringify({ title, description, deadline }),
        });
        const data = await resp.json();
        if (data.success) {
          showToast('✅ 投票创建成功');
          document.getElementById('voteForm').reset();
          loadVotes();
        } else {
          showToast('❌ ' + (data.error || '创建失败'), 'error');
          if (resp.status === 401) { sessionStorage.removeItem('admin_pass'); adminPassword = ''; logout(); }
        }
      } catch (err) { showToast('创建失败: ' + err.message, 'error'); }
    });

    window.deleteVote = async function(id) {
      if (!confirm('确定要删除这个投票吗？')) return;
      if (!adminPassword) { showToast('请先登录', 'error'); return; }
      try {
        const resp = await fetch(API_BASE + '/api/votes/' + id, {
          method: 'DELETE',
          headers: { 'Authorization': 'Bearer ' + adminPassword },
        });
        const data = await resp.json();
        if (data.success) { showToast('✅ 投票已删除'); loadVotes(); }
        else { showToast('❌ ' + (data.error || '删除失败'), 'error'); if (resp.status === 401) logout(); }
      } catch (err) { showToast('删除失败: ' + err.message, 'error'); }
    };

    let editingVoteId = null;

    window.editVote = async function(id) {
      editingVoteId = id;
      // 从列表中找当前数据填充
      try {
        const resp = await fetch(API_BASE + '/api/votes');
        const data = await resp.json();
        const vote = data.votes?.find(v => v.id === id);
        if (vote) {
          document.getElementById('editVoteTitle').value = vote.title || '';
          document.getElementById('editVoteDesc').value = vote.description || '';
          document.getElementById('editVoteDeadline').value = vote.deadline || '';
        }
      } catch {}
      document.getElementById('editVoteOverlay').style.display = 'flex';
    };

    window.closeEditVote = function() {
      document.getElementById('editVoteOverlay').style.display = 'none';
      editingVoteId = null;
    };

    window.saveEditVote = async function() {
      const title = document.getElementById('editVoteTitle').value.trim();
      const description = document.getElementById('editVoteDesc').value.trim();
      const deadline = document.getElementById('editVoteDeadline').value || null;
      if (!title && !description && !deadline) { showToast('至少修改一项', 'error'); return; }
      if (!adminPassword) { showToast('请先登录', 'error'); return; }
      const body = {};
      if (title) body.title = title;
      if (description) body.description = description;
      body.deadline = deadline; // 允许清空截止日期
      try {
        const resp = await fetch(API_BASE + '/api/votes/' + editingVoteId, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + adminPassword },
          body: JSON.stringify(body),
        });
        const data = await resp.json();
        if (data.success) { showToast('✅ 投票已更新'); closeEditVote(); loadVotes(); }
        else { showToast('❌ ' + (data.error || '更新失败'), 'error'); if (resp.status === 401) logout(); }
      } catch (err) { showToast('更新失败: ' + err.message, 'error'); }
    };

    // ============================================================
    // 加载帖子列表
    // ============================================================
    async function loadPosts() {
      const container = document.getElementById('postList');
      try {
        const resp = await fetch(API_BASE + '/api/posts');
        const data = await resp.json();

        if (!data.success || !data.posts || data.posts.length === 0) {
          container.innerHTML = '<div class="empty-state">📭 暂无动态</div>';
          return;
        }

        container.innerHTML = data.posts.map(post => `
          <div class="post-item">
            <div class="info">
              <span class="title">${post.title}</span>
              ${post.pinned ? '<span class="pin-badge">置顶</span>' : ''}
              <span class="meta">${post.author} · ${post.date}</span>
            </div>
            <div class="actions">
              <button class="btn btn-danger" onclick="deletePost('${post.id}')">删除</button>
            </div>
          </div>
        `).join('');
      } catch (err) {
        container.innerHTML = '<div class="empty-state">❌ 加载失败</div>';
        console.error(err);
      }
    }

    // ============================================================
    // 发布帖子
    // ============================================================
    document.getElementById('postForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const title = document.getElementById('postTitle').value.trim();
      const author = document.getElementById('postAuthor').value.trim();
      const excerpt = document.getElementById('postExcerpt').value.trim();
      const content = document.getElementById('postContent').value.trim();
      const pinned = document.getElementById('postPinned').value === 'true';

      if (!title || !author) {
        showToast('标题和发布人为必填项', 'error');
        return;
      }

      if (!adminPassword) { showToast('请先登录', 'error'); return; }

      try {
        const resp = await fetch(API_BASE + '/api/posts', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + adminPassword,
          },
          body: JSON.stringify({ title, author, excerpt, content, pinned }),
        });

        const data = await resp.json();
        if (data.success) {
          showToast('✅ 帖子发布成功！');
          document.getElementById('postForm').reset();
          loadPosts();
        } else {
          showToast('❌ ' + (data.error || '发布失败'), 'error');
          if (resp.status === 401) logout();
        }
      } catch (err) {
        showToast('发布失败: ' + err.message, 'error');
      }
    });

    // ============================================================
    // 删除帖子
    // ============================================================
    window.deletePost = async function(postId) {
      if (!confirm('确定要删除这篇帖子吗？')) return;
      if (!adminPassword) { showToast('请先登录', 'error'); return; }

      try {
        const resp = await fetch(API_BASE + '/api/posts/' + postId, {
          method: 'DELETE',
          headers: {
            'Authorization': 'Bearer ' + adminPassword,
          },
        });

        const data = await resp.json();
        if (data.success) {
          showToast('✅ 帖子已删除');
          loadPosts();
        } else {
          showToast('❌ ' + (data.error || '删除失败'), 'error');
          if (resp.status === 401) logout();
        }
      } catch (err) {
        showToast('删除失败: ' + err.message, 'error');
      }
    };

    // ============================================================
    // Tab 切换
    // ============================================================
    window.switchTab = function(name) {
      document.querySelectorAll('.tab-content').forEach(el => el.style.display = 'none');
      document.getElementById('tab-' + name).style.display = 'block';
      document.querySelectorAll('.tab-btn').forEach(el => {
        el.style.background = el.dataset.tab === name ? 'rgba(90,176,224,.1)' : 'transparent';
        el.style.color = el.dataset.tab === name ? '#7bb3d9' : 'rgba(160,175,190,.5)';
        el.style.borderColor = el.dataset.tab === name ? 'rgba(160,175,190,.1)' : 'rgba(160,175,190,.08)';
      });
      if (name === 'stories' && !window._storiesLoaded) { window._storiesLoaded = true; loadStories(); }
    };

    // ============================================================
    // 加载神人榜
    // ============================================================
    async function loadStories() {
      const container = document.getElementById('storyList');
      try {
        const resp = await fetch(API_BASE + '/api/stories');
        const data = await resp.json();
        if (!data.success || !data.stories || data.stories.length === 0) {
          container.innerHTML = '<div class="empty-state">📭 暂无记录</div>';
          return;
        }
        container.innerHTML = data.stories.map(s => `
          <div class="post-item">
            <div class="info">
              <span class="title">${s.title}</span>
              <span class="meta">${s.date} · ${s.content.replace(/<[^>]+>/g,'').slice(0,50)}${s.content.length > 50 ? '...' : ''}</span>
            </div>
            <div class="actions">
              <button class="btn btn-danger" onclick="deleteStory('${s.id}')">删除</button>
            </div>
          </div>
        `).join('');
      } catch { container.innerHTML = '<div class="empty-state">❌ 加载失败</div>'; }
    }

    document.getElementById('storyForm')?.addEventListener('submit', async (e) => {
      e.preventDefault();
      const title = document.getElementById('storyTitle').value.trim();
      const text = document.getElementById('storyText').value.trim();
      const imagesRaw = document.getElementById('storyImageUrls').value.trim();
      if (!title || !text) { showToast('标题和事件描述为必填项', 'error'); return; }
      if (!adminPassword) { showToast('请先登录', 'error'); return; }
      const images = imagesRaw ? imagesRaw.split('\n').map(s => s.trim()).filter(s => s.startsWith('http')) : [];
      try {
        const resp = await fetch(API_BASE + '/api/stories', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + adminPassword },
          body: JSON.stringify({ title, text, images }),
        });
        const data = await resp.json();
        if (data.success) {
          showToast('✅ 添加成功');
          document.getElementById('storyForm').reset();
          loadStories();
        } else { showToast('❌ ' + (data.error || '失败'), 'error'); if (resp.status === 401) logout(); }
      } catch (err) { showToast('失败: ' + err.message, 'error'); }
    });

    window.deleteStory = async function(id) {
      if (!confirm('确定要删除这条记录吗？')) return;
      if (!adminPassword) { showToast('请先登录', 'error'); return; }
      try {
        const resp = await fetch(API_BASE + '/api/stories/' + id, {
          method: 'DELETE',
          headers: { 'Authorization': 'Bearer ' + adminPassword },
        });
        const data = await resp.json();
        if (data.success) { showToast('✅ 已删除'); loadStories(); }
        else { showToast('❌ ' + (data.error || '失败'), 'error'); if (resp.status === 401) logout(); }
      } catch (err) { showToast('失败: ' + err.message, 'error'); }
    };
  </script>
</body>
</html>
