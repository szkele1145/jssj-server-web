<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>建设世界 · 服务器官网</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
      background-color: #0b0d10;
      color: #eef2f5;
      transition: background-color 0.3s ease, color 0.2s ease;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      font-weight: 350;
      letter-spacing: 0.3px;
    }

    body.light-mode {
      background-color: #f0f4fa;
      color: #1a212a;
    }

    .grid-background {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(180, 190, 200, 0.12) 1px, transparent 1px),
        linear-gradient(90deg, rgba(180, 190, 200, 0.12) 1px, transparent 1px);
      background-size: 28px 28px;
      background-position: center center;
      opacity: 0.9;
      transition: opacity 0.2s;
    }

    body.light-mode .grid-background {
      background-image:
        linear-gradient(rgba(120, 130, 145, 0.15) 1px, transparent 1px),
        linear-gradient(90deg, rgba(120, 130, 145, 0.15) 1px, transparent 1px);
      opacity: 0.7;
    }

    .app {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      max-width: 1440px;
      margin: 0 auto;
      padding: 1.8rem 2.8rem;
      width: 100%;
    }

    .navbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.3rem 0 1.2rem 0;
      border-bottom: 1px solid rgba(160, 175, 190, 0.15);
      backdrop-filter: blur(2px);
      transition: border-color 0.2s;
      flex-wrap: wrap;
      gap: 1rem 0.5rem;
    }

    body.light-mode .navbar {
      border-bottom: 1px solid rgba(80, 100, 120, 0.15);
    }

    .navbar-left {
      display: flex;
      align-items: center;
      gap: 1.4rem;
    }

    .sidebar-toggle {
      background: rgba(20, 30, 40, 0.3);
      border: 1px solid rgba(160, 175, 190, 0.2);
      color: #c8dce6;
      font-size: 1.4rem;
      width: 44px;
      height: 44px;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.25s ease;
      backdrop-filter: blur(4px);
      background: rgba(200, 215, 230, 0.02);
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
      font-family: inherit;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .sidebar-toggle i {
      color: #9ab8cc;
      transition: 0.2s;
    }

    .sidebar-toggle:hover {
      background: rgba(180, 200, 220, 0.06);
      border-color: #8ab8d0;
      box-shadow: 0 0 24px rgba(120, 180, 210, 0.15);
      color: #f0f8ff;
    }

    .sidebar-toggle:hover i {
      color: #b0d8ee;
    }

    body.light-mode .sidebar-toggle {
      background: rgba(220, 235, 250, 0.4);
      border-color: rgba(80, 120, 160, 0.2);
      color: #1f3a4e;
      box-shadow: 0 0 6px rgba(0, 0, 0, 0.02);
    }

    body.light-mode .sidebar-toggle i {
      color: #2f5f7a;
    }

    body.light-mode .sidebar-toggle:hover {
      background: rgba(190, 215, 240, 0.5);
      border-color: #4f8aaa;
      box-shadow: 0 0 20px rgba(60, 140, 200, 0.15);
      color: #0a1a2a;
    }

    .server-name {
      font-size: 1.9rem;
      font-weight: 480;
      letter-spacing: 4px;
      background: linear-gradient(145deg, #d0e8f5 0%, #7bb3d9 70%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 0 20px rgba(90, 170, 220, 0.15);
      transition: 0.2s;
      margin-left: 0.2rem;
      font-family: 'Inter', 'Segoe UI', sans-serif;
    }

    body.light-mode .server-name {
      background: linear-gradient(145deg, #1f5a7a, #3a7fa0);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 0 18px rgba(30, 100, 160, 0.12);
    }

    .navbar-right {
      display: flex;
      align-items: center;
    }

    .theme-toggle {
      background: rgba(20, 30, 40, 0.25);
      border: 1px solid rgba(160, 175, 190, 0.15);
      color: #b8d0dd;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
      cursor: pointer;
      transition: 0.25s ease;
      backdrop-filter: blur(4px);
      box-shadow: 0 0 12px rgba(0, 0, 0, 0.1);
    }

    .theme-toggle:hover {
      border-color: #8ab8d0;
      background: rgba(160, 190, 215, 0.08);
      box-shadow: 0 0 28px rgba(100, 180, 220, 0.15);
      transform: scale(1.02);
      color: #eaf4fc;
    }

    body.light-mode .theme-toggle {
      background: rgba(220, 235, 250, 0.5);
      border-color: rgba(80, 120, 160, 0.2);
      color: #1f4a66;
      box-shadow: 0 0 8px rgba(0, 0, 0, 0.02);
    }

    body.light-mode .theme-toggle:hover {
      background: rgba(190, 215, 240, 0.6);
      border-color: #3f7a9a;
      box-shadow: 0 0 28px rgba(50, 140, 200, 0.15);
      color: #0a1a2a;
    }

    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      height: 100%;
      width: 280px;
      background: rgba(10, 16, 22, 0.92);
      backdrop-filter: blur(20px);
      border-right: 1px solid rgba(160, 175, 190, 0.12);
      box-shadow: 8px 0 60px rgba(0, 0, 0, 0.5);
      transform: translateX(-105%);
      transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      z-index: 1000;
      padding: 2.4rem 1.8rem;
      display: flex;
      flex-direction: column;
      gap: 2.5rem;
      pointer-events: none;
    }

    .sidebar.open {
      transform: translateX(0);
      pointer-events: auto;
    }

    body.light-mode .sidebar {
      background: rgba(235, 242, 250, 0.94);
      backdrop-filter: blur(20px);
      border-right: 1px solid rgba(80, 120, 160, 0.15);
      box-shadow: 8px 0 40px rgba(0, 0, 0, 0.06);
    }

    .sidebar-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(160, 175, 190, 0.1);
      padding-bottom: 1.2rem;
    }

    .sidebar-header span {
      font-size: 1.5rem;
      font-weight: 480;
      letter-spacing: 3px;
      background: linear-gradient(145deg, #b8d8ee, #7bb3d9);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 0 10px rgba(90, 170, 220, 0.25);
    }

    body.light-mode .sidebar-header span {
      background: linear-gradient(145deg, #1f5a7a, #3a7fa0);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 0 12px rgba(30, 100, 160, 0.2);
    }

    .sidebar-close {
      background: transparent;
      border: none;
      color: #8aacbf;
      font-size: 1.8rem;
      cursor: pointer;
      transition: 0.25s ease;
      padding: 0 0.2rem;
      line-height: 1;
    }

    .sidebar-close i {
      transition: transform 0.3s ease;
    }

    .sidebar-close:hover i {
      transform: rotate(90deg);
      color: #b0d8ee;
    }

    body.light-mode .sidebar-close {
      color: #2f5f7a;
    }
    body.light-mode .sidebar-close:hover i {
      color: #1a4a66;
    }

    .sidebar-menu {
      display: flex;
      flex-direction: column;
      gap: 1.6rem;
      margin-top: 0.2rem;
    }

    .sidebar-menu a {
      color: #c8dce6;
      text-decoration: none;
      font-size: 1.2rem;
      font-weight: 340;
      letter-spacing: 1px;
      padding: 0.3rem 0.2rem;
      border-bottom: 1px solid transparent;
      transition: 0.2s;
      display: flex;
      align-items: center;
      gap: 1rem;
      cursor: pointer;
    }

    .sidebar-menu a i {
      width: 1.6rem;
      color: #8fc4de;
      transition: 0.2s;
      font-size: 1.1rem;
    }

    .sidebar-menu a:hover {
      color: #f0f8ff;
      border-bottom-color: #8ab8d0;
      padding-left: 0.6rem;
      text-shadow: 0 0 14px rgba(120, 190, 230, 0.2);
    }

    .sidebar-menu a:hover i {
      color: #aad0ea;
      text-shadow: 0 0 16px rgba(120, 190, 230, 0.2);
    }

    body.light-mode .sidebar-menu a {
      color: #1a3a4e;
    }
    body.light-mode .sidebar-menu a i {
      color: #2f7a9a;
    }
    body.light-mode .sidebar-menu a:hover {
      color: #02121e;
      border-bottom-color: #3f8aaa;
      text-shadow: 0 0 12px rgba(40, 130, 190, 0.15);
    }
    body.light-mode .sidebar-menu a:hover i {
      color: #1f6a8a;
      text-shadow: 0 0 14px rgba(40, 130, 190, 0.15);
    }

    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 2.5rem 0.5rem 3rem 0.5rem;
      position: relative;
    }

    .page-container {
      display: flex;
      flex-direction: column;
      flex: 1;
      width: 100%;
      max-width: 900px;
      margin: 0 auto;
    }

    #homePage {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
    }

    #homePage .server-status {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem 0;
      border-bottom: 1px solid rgba(160, 175, 190, 0.06);
      width: 100%;
    }

    #homePage .server-status .title {
      font-size: 2.8rem;
      font-weight: 500;
      letter-spacing: 6px;
      background: linear-gradient(145deg, #d0e8f5 0%, #7bb3d9 70%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 0 30px rgba(90, 170, 220, 0.12);
      margin-bottom: 0.6rem;
    }

    body.light-mode #homePage .server-status .title {
      background: linear-gradient(145deg, #1f5a7a, #3a7fa0);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 0 20px rgba(30, 100, 160, 0.1);
    }

    #homePage .server-status .uptime {
      font-size: 1.2rem;
      font-weight: 300;
      color: #9ab8cc;
      letter-spacing: 2px;
    }

    #homePage .server-status .uptime span {
      color: #5ab0e0;
      font-weight: 500;
      text-shadow: 0 0 20px rgba(90, 176, 224, 0.2);
    }

    body.light-mode #homePage .server-status .uptime {
      color: #3a6a8a;
    }

    body.light-mode #homePage .server-status .uptime span {
      color: #1f7a9a;
      text-shadow: 0 0 12px rgba(30, 120, 180, 0.15);
    }

    .nav-button {
      margin-top: 2.8rem;
      padding: 0.75rem 2.8rem;
      font-size: 1.1rem;
      font-weight: 400;
      letter-spacing: 3px;
      background: rgba(20, 30, 40, 0.25);
      border: 1px solid rgba(160, 175, 190, 0.15);
      border-radius: 40px;
      color: #b8d0dd;
      cursor: pointer;
      transition: 0.25s ease;
      backdrop-filter: blur(4px);
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.05);
      font-family: inherit;
    }

    .nav-button:hover {
      border-color: #8ab8d0;
      background: rgba(160, 190, 215, 0.06);
      box-shadow: 0 0 32px rgba(100, 180, 220, 0.08);
      color: #eaf4fc;
      transform: translateY(-1px);
    }

    body.light-mode .nav-button {
      background: rgba(220, 235, 250, 0.3);
      border-color: rgba(80, 120, 160, 0.15);
      color: #1f4a66;
    }

    body.light-mode .nav-button:hover {
      background: rgba(190, 215, 240, 0.4);
      border-color: #3f7a9a;
      box-shadow: 0 0 32px rgba(50, 140, 200, 0.08);
      color: #0a1a2a;
    }

    #forumPage {
      display: none;
      flex-direction: column;
      flex: 1;
    }

    #forumPage.active {
      display: flex;
    }

    .forum-header {
      padding-bottom: 1.2rem;
      border-bottom: 1px solid rgba(160, 175, 190, 0.06);
      margin-bottom: 1.8rem;
    }

    .forum-header h2 {
      font-size: 1.8rem;
      font-weight: 400;
      letter-spacing: 4px;
      color: #b8d0dd;
    }

    .forum-header h2 i {
      color: #7bb3d9;
      margin-right: 10px;
    }

    body.light-mode .forum-header h2 {
      color: #1f4a66;
    }

    .forum-post {
      background: rgba(16, 24, 32, 0.2);
      border: 1px solid rgba(160, 175, 190, 0.04);
      border-radius: 16px;
      padding: 1.5rem 1.8rem;
      margin-bottom: 1.2rem;
      transition: 0.2s;
    }

    body.light-mode .forum-post {
      background: rgba(220, 235, 250, 0.12);
      border-color: rgba(80, 120, 160, 0.04);
    }

    .forum-post:hover {
      border-color: rgba(160, 175, 190, 0.1);
    }

    body.light-mode .forum-post:hover {
      border-color: rgba(80, 120, 160, 0.1);
    }

    .forum-post .post-title {
      font-size: 1.15rem;
      font-weight: 450;
      color: #d0e6f0;
      margin-bottom: 0.4rem;
    }

    .forum-post .post-title .pin-badge {
      font-size: 0.65rem;
      font-weight: 400;
      background: rgba(90, 176, 224, 0.15);
      border: 1px solid rgba(90, 176, 224, 0.2);
      color: #5ab0e0;
      padding: 0.1rem 0.7rem;
      border-radius: 20px;
      margin-left: 10px;
      letter-spacing: 1px;
      vertical-align: middle;
    }

    body.light-mode .forum-post .post-title .pin-badge {
      background: rgba(30, 120, 180, 0.1);
      border-color: rgba(30, 120, 180, 0.15);
      color: #1f7a9a;
    }

    body.light-mode .forum-post .post-title {
      color: #1a3a4e;
    }

    .forum-post .post-meta {
      font-size: 0.8rem;
      color: rgba(160, 175, 190, 0.4);
      letter-spacing: 1px;
      margin-bottom: 0.6rem;
    }

    body.light-mode .forum-post .post-meta {
      color: rgba(60, 100, 130, 0.4);
    }

    .forum-post .post-excerpt {
      font-size: 0.95rem;
      color: rgba(200, 215, 230, 0.6);
      line-height: 1.6;
    }

    body.light-mode .forum-post .post-excerpt {
      color: rgba(30, 60, 80, 0.6);
    }

    #underConstructionPage {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      text-align: center;
      gap: 1.5rem;
    }

    #underConstructionPage.active {
      display: flex;
    }

    #underConstructionPage .construction-icon {
      font-size: 4rem;
      color: rgba(160, 175, 190, 0.15);
      margin-bottom: 0.5rem;
    }

    #underConstructionPage .construction-title {
      font-size: 2rem;
      font-weight: 350;
      letter-spacing: 4px;
      color: #b8d0dd;
    }

    body.light-mode #underConstructionPage .construction-title {
      color: #1f4a66;
    }

    #underConstructionPage .construction-desc {
      font-size: 1rem;
      color: rgba(160, 175, 190, 0.3);
      letter-spacing: 2px;
    }

    body.light-mode #underConstructionPage .construction-desc {
      color: rgba(60, 100, 130, 0.3);
    }

    .back-home-btn {
      margin-top: 1rem;
      padding: 0.6rem 2.4rem;
      font-size: 1rem;
      font-weight: 400;
      letter-spacing: 2px;
      background: rgba(20, 30, 40, 0.2);
      border: 1px solid rgba(160, 175, 190, 0.12);
      border-radius: 40px;
      color: #b8d0dd;
      cursor: pointer;
      transition: 0.25s ease;
      font-family: inherit;
    }

    .back-home-btn:hover {
      border-color: #8ab8d0;
      background: rgba(160, 190, 215, 0.05);
      color: #eaf4fc;
    }

    body.light-mode .back-home-btn {
      background: rgba(220, 235, 250, 0.2);
      border-color: rgba(80, 120, 160, 0.1);
      color: #1f4a66;
    }

    body.light-mode .back-home-btn:hover {
      background: rgba(190, 215, 240, 0.3);
      border-color: #3f7a9a;
      color: #0a1a2a;
    }

    /* ===== 服务器状态页面 ===== */
    #serverPage {
      display: none;
      flex-direction: column;
      flex: 1;
    }

    #serverPage.active {
      display: flex;
    }

    .server-header {
      padding-bottom: 1.2rem;
      border-bottom: 1px solid rgba(160, 175, 190, 0.06);
      margin-bottom: 1.8rem;
    }

    .server-header h2 {
      font-size: 1.8rem;
      font-weight: 400;
      letter-spacing: 4px;
      color: #b8d0dd;
    }

    .server-header h2 i {
      color: #7bb3d9;
      margin-right: 10px;
    }

    body.light-mode .server-header h2 {
      color: #1f4a66;
    }

    .server-status-card {
      background: rgba(16, 24, 32, 0.2);
      border: 1px solid rgba(160, 175, 190, 0.04);
      border-radius: 16px;
      padding: 2rem;
      margin-bottom: 1.2rem;
      transition: 0.2s;
    }

    body.light-mode .server-status-card {
      background: rgba(220, 235, 250, 0.12);
      border-color: rgba(80, 120, 160, 0.04);
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 0.35rem 1.2rem;
      border-radius: 20px;
      font-size: 0.9rem;
      font-weight: 400;
      letter-spacing: 2px;
      margin-bottom: 1.2rem;
    }

    .status-badge.online {
      color: #5ad0a0;
      border: 1px solid rgba(90, 208, 160, 0.2);
      background: rgba(90, 208, 160, 0.08);
    }

    .status-badge.offline {
      color: #e06060;
      border: 1px solid rgba(224, 96, 96, 0.2);
      background: rgba(224, 96, 96, 0.08);
    }

    .status-badge .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
    }

    .status-badge.online .dot {
      background: #5ad0a0;
      box-shadow: 0 0 8px rgba(90, 208, 160, 0.5);
    }

    .status-badge.offline .dot {
      background: #e06060;
      box-shadow: 0 0 8px rgba(224, 96, 96, 0.4);
    }

    .online-count {
      font-size: 1.4rem;
      font-weight: 450;
      letter-spacing: 2px;
      color: #d0e6f0;
      margin-bottom: 1.2rem;
    }

    body.light-mode .online-count {
      color: #1a3a4e;
    }

    .player-section {
      margin-bottom: 1rem;
    }

    .player-section:last-of-type {
      margin-bottom: 0;
    }

    .player-section .section-label {
      font-size: 0.75rem;
      color: rgba(160, 175, 190, 0.35);
      letter-spacing: 2px;
      margin-bottom: 0.5rem;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    body.light-mode .player-section .section-label {
      color: rgba(60, 100, 130, 0.35);
    }

    .player-section .section-label .badge {
      font-size: 0.6rem;
      padding: 0.1rem 0.5rem;
      border-radius: 10px;
      letter-spacing: 1px;
    }

    .badge.java {
      border: 1px solid rgba(90, 176, 224, 0.2);
      background: rgba(90, 176, 224, 0.1);
      color: #5ab0e0;
    }

    .badge.bedrock {
      border: 1px solid rgba(224, 176, 90, 0.2);
      background: rgba(224, 176, 90, 0.1);
      color: #e0b05a;
    }

    .player-list {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
    }

    .player-name {
      padding: 0.2rem 0.7rem;
      border-radius: 6px;
      font-size: 0.9rem;
      background: rgba(200, 215, 230, 0.03);
      border: 1px solid rgba(160, 175, 190, 0.04);
      color: #c8dce6;
    }

    body.light-mode .player-name {
      background: rgba(200, 215, 230, 0.06);
      color: #1a3a4e;
    }

    .motd-display {
      padding: 1rem 1.2rem;
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid rgba(160, 175, 190, 0.06);
      border-radius: 10px;
      font-family: 'Courier New', monospace;
      font-size: 0.95rem;
      line-height: 1.6;
      text-align: center;
      color: #c8dce6;
      margin-top: 1.2rem;
    }

    body.light-mode .motd-display {
      background: rgba(0, 0, 0, 0.04);
      color: #1a3a4e;
      border-color: rgba(80, 120, 160, 0.06);
    }

    .server-updated {
      text-align: right;
      font-size: 0.75rem;
      color: rgba(160, 175, 190, 0.2);
      letter-spacing: 1px;
      margin-top: 0.5rem;
    }

    body.light-mode .server-updated {
      color: rgba(60, 100, 130, 0.2);
    }

    .refresh-btn {
      background: transparent;
      border: 1px solid rgba(160, 175, 190, 0.1);
      color: rgba(160, 175, 190, 0.4);
      padding: 0.3rem 1rem;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.8rem;
      font-family: inherit;
      letter-spacing: 1px;
      transition: 0.2s;
      margin-left: 0.8rem;
    }

    .refresh-btn:hover {
      border-color: #8ab8d0;
      color: #8ab8d0;
    }

    .footer-copy {
      margin-top: 1rem;
      text-align: center;
      font-size: 0.75rem;
      color: rgba(160, 175, 190, 0.2);
      letter-spacing: 1.5px;
      font-weight: 200;
      transition: color 0.2s;
    }

    body.light-mode .footer-copy {
      color: rgba(60, 100, 130, 0.2);
    }

    @media (max-width: 640px) {
      .app {
        padding: 1.2rem 1.2rem;
      }
      #homePage .server-status .title {
        font-size: 2rem;
        letter-spacing: 4px;
      }
      #homePage .server-status .uptime {
        font-size: 1rem;
      }
      .nav-button {
        padding: 0.6rem 2rem;
        font-size: 1rem;
      }
      .sidebar {
        width: 240px;
        padding: 1.8rem 1.2rem;
      }
      .forum-header h2 {
        font-size: 1.4rem;
      }
      #underConstructionPage .construction-title {
        font-size: 1.5rem;
      }
    }
  </style>
</head>
<body>

  <div class="grid-background"></div>

  <nav class="sidebar" id="sidebar" aria-label="侧边导航">
    <div class="sidebar-header">
      <span>📁 目录</span>
      <button class="sidebar-close" id="sidebarClose"><i class="fas fa-times"></i></button>
    </div>
    <div class="sidebar-menu">
      <a id="menuHome"><i class="fas fa-home"></i> 首页</a>
      <a id="menuServer"><i class="fas fa-server"></i> 服务器</a>
      <a id="menuMembers"><i class="fas fa-users"></i> 成员</a>
      <a id="menuForum"><i class="fas fa-comment-dots"></i> 动态</a>
    </div>
    <div style="margin-top: auto; opacity: 0.15; font-size: 0.7rem; padding-top: 2rem; letter-spacing: 1px;">
      <i class="fas fa-ellipsis-h"></i> v0.2
    </div>
  </nav>

  <div class="app">
    <header class="navbar">
      <div class="navbar-left">
        <button class="sidebar-toggle" id="sidebarToggle">
          <i class="fas fa-bars"></i>
        </button>
        <div class="server-name">建设世界</div>
      </div>
      <div class="navbar-right">
        <button class="theme-toggle" id="themeToggle">
          <i class="fas fa-moon" id="themeIcon"></i>
        </button>
      </div>
    </header>

    <main class="main-content">
      <div class="page-container">

        <div id="homePage">
          <div class="server-status">
            <div class="title">建设世界服务器</div>
            <div class="uptime">
              已运行 <span id="uptimeDays">--</span> 天
            </div>
          </div>
          <button class="nav-button" id="navButton">
            <i class="fas fa-compass" style="margin-right: 8px;"></i> 导航
          </button>
        </div>

        <div id="serverPage">
          <div class="server-header">
            <h2><i class="fas fa-server"></i> 服务器状态</h2>
          </div>
          <div id="serverStatusContent">
            <div class="server-status-card" style="text-align:center;padding:3rem;">
              <i class="fas fa-spinner fa-pulse" style="font-size:2rem;opacity:0.3;"></i>
              <div style="margin-top:1rem;opacity:0.3;font-size:0.9rem;">获取中...</div>
            </div>
          </div>
        </div>

        <div id="forumPage">
          <div class="forum-header">
            <h2><i class="fas fa-comment-dots"></i> 服务器动态</h2>
          </div>
          <div id="forumPosts"></div>
        </div>

        <div id="underConstructionPage">
          <div class="construction-icon"><i class="fas fa-hard-hat"></i></div>
          <div class="construction-title">你来到了一个没有开发完的页面</div>
          <div class="construction-desc">🚧 施工中，敬请期待</div>
          <button class="back-home-btn" id="backHomeBtn">
            <i class="fas fa-arrow-left" style="margin-right: 8px;"></i> 回到首页
          </button>
        </div>

      </div>
    </main>

    <div class="footer-copy">
      © 2077 建设世界. 并不保留所有权利。
    </div>
  </div>

  <script>
    // ============================================================
    // 配置
    // ============================================================
    const API_BASE = 'https://api.jssj.cc.cd';

    // ============================================================
    // 页面逻辑
    // ============================================================
    const sidebar = document.getElementById('sidebar');
    const sidebarToggle = document.getElementById('sidebarToggle');
    const sidebarClose = document.getElementById('sidebarClose');
    const navButton = document.getElementById('navButton');
    const themeToggle = document.getElementById('themeToggle');
    const themeIcon = document.getElementById('themeIcon');
    const body = document.body;

    const homePage = document.getElementById('homePage');
    const serverPage = document.getElementById('serverPage');
    const forumPage = document.getElementById('forumPage');
    const underConstructionPage = document.getElementById('underConstructionPage');
    const menuHome = document.getElementById('menuHome');
    const menuServer = document.getElementById('menuServer');
    const menuMembers = document.getElementById('menuMembers');
    const menuForum = document.getElementById('menuForum');
    const backHomeBtn = document.getElementById('backHomeBtn');

    function showHome() {
      homePage.style.display = 'flex';
      serverPage.classList.remove('active'); serverPage.style.display = 'none';
      forumPage.classList.remove('active'); forumPage.style.display = 'none';
      underConstructionPage.classList.remove('active'); underConstructionPage.style.display = 'none';
      closeSidebar();
    }

    function showServer() {
      homePage.style.display = 'none';
      serverPage.style.display = 'flex'; serverPage.classList.add('active');
      forumPage.classList.remove('active'); forumPage.style.display = 'none';
      underConstructionPage.classList.remove('active'); underConstructionPage.style.display = 'none';
      closeSidebar();
      fetchServerStatus();
    }

    function showForum() {
      homePage.style.display = 'none';
      serverPage.classList.remove('active'); serverPage.style.display = 'none';
      forumPage.style.display = 'flex'; forumPage.classList.add('active');
      underConstructionPage.classList.remove('active'); underConstructionPage.style.display = 'none';
      closeSidebar();
      fetchForumPosts();
    }

    function showUnderConstruction() {
      homePage.style.display = 'none';
      serverPage.classList.remove('active'); serverPage.style.display = 'none';
      forumPage.classList.remove('active'); forumPage.style.display = 'none';
      underConstructionPage.style.display = 'flex'; underConstructionPage.classList.add('active');
      closeSidebar();
    }

    homePage.style.display = 'flex';
    serverPage.style.display = 'none';
    forumPage.style.display = 'none';
    underConstructionPage.style.display = 'none';

    menuHome.addEventListener('click', showHome);
    menuServer.addEventListener('click', showServer);
    menuMembers.addEventListener('click', showUnderConstruction);
    menuForum.addEventListener('click', showForum);
    backHomeBtn.addEventListener('click', showHome);

    navButton.addEventListener('click', function(e) {
      e.stopPropagation();
      openSidebar();
    });

    function openSidebar() { sidebar.classList.add('open'); }
    function closeSidebar() { sidebar.classList.remove('open'); }

    sidebarToggle.addEventListener('click', openSidebar);
    sidebarClose.addEventListener('click', closeSidebar);

    document.addEventListener('click', function(e) {
      if (sidebar.classList.contains('open')) {
        if (!sidebar.contains(e.target) && e.target !== sidebarToggle && !sidebarToggle.contains(e.target) && e.target !== navButton) {
          closeSidebar();
        }
      }
    });
    sidebar.addEventListener('click', function(e) {
      e.stopPropagation();
    });

    // 明暗模式
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    if (!prefersDark) {
      body.classList.add('light-mode');
      themeIcon.className = 'fas fa-sun';
    } else {
      body.classList.remove('light-mode');
      themeIcon.className = 'fas fa-moon';
    }

    themeToggle.addEventListener('click', function() {
      body.classList.toggle('light-mode');
      themeIcon.className = body.classList.contains('light-mode') ? 'fas fa-sun' : 'fas fa-moon';
    });

    // ============================================================
    // API 调用 - 服务器运行天数
    // ============================================================
    const uptimeElement = document.getElementById('uptimeDays');

    async function fetchUptime() {
      try {
        const resp = await fetch(API_BASE + '/api/uptime');
        const data = await resp.json();
        if (data.success) {
          uptimeElement.textContent = data.days;
        }
      } catch (err) {
        console.warn('获取运行天数失败:', err);
        const startDate = new Date('2024-06-28');
        const now = new Date();
        const diffTime = Math.abs(now - startDate);
        const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
        uptimeElement.textContent = diffDays;
      }
    }

    fetchUptime();

    // ============================================================
    // API 调用 - 服务器实时状态
    // ============================================================
    let serverRefreshTimer = null;

    function renderServerStatus(data) {
      const container = document.getElementById('serverStatusContent');
      const online = data.online;
      const statusClass = online ? 'online' : 'offline';
      const label = online ? '在线' : '离线';

      const count = online ? (data.players?.online ?? 0) : 0;

      let motdHtml = '';
      if (online && data.motd?.html?.length) {
        motdHtml = data.motd.html.join('<br>');
      } else if (online && data.motd?.clean?.length) {
        motdHtml = data.motd.clean.join('<br>');
      } else if (online) {
        motdHtml = '<span style="opacity:0.3;">无 MOTD</span>';
      }

      // 分离 Java / 基岩版 / 机器人
      const javaPlayers = data.players?.list || [];
      const infoList = data.info || [];
      const bedrockPlayers = infoList.filter(n => n.startsWith('.')).map(n => n.slice(1));
      const botCount = infoList.filter(n => n === 'Anonymous Player').length;

      let playersHtml = '';
      if (!online) {
        playersHtml = '<div style="opacity:0.3;text-align:center;padding:1rem 0;">服务器离线</div>';
      } else if (javaPlayers.length === 0 && bedrockPlayers.length === 0) {
        playersHtml = '<div style="opacity:0.3;text-align:center;padding:0.5rem 0;">暂无玩家在线</div>';
      } else {
        let sections = '';
        if (javaPlayers.length > 0) {
          sections += `
            <div class="player-section">
              <div class="section-label"><span class="badge java">Java</span> ${javaPlayers.length} 人</div>
              <div class="player-list">${javaPlayers.map(n => `<span class="player-name">${n}</span>`).join('')}</div>
            </div>`;
        }
        if (bedrockPlayers.length > 0) {
          sections += `
            <div class="player-section">
              <div class="section-label"><span class="badge bedrock">BE</span> ${bedrockPlayers.length} 人</div>
              <div class="player-list">${bedrockPlayers.map(n => `<span class="player-name">${n}</span>`).join('')}</div>
            </div>`;
        }
        if (botCount > 0) {
          sections += `
            <div class="player-section">
              <div class="section-label"><span style="opacity:0.4;"><i class="fas fa-robot"></i> 机器人</span> ${botCount}</div>
            </div>`;
        }
        playersHtml = sections;
      }

      const now = new Date();
      const timeStr = now.toLocaleTimeString('zh-CN', { hour12: false });

      container.innerHTML = `
        <div class="server-status-card">
          <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:0.5rem;">
            <div class="status-badge ${statusClass}">
              <span class="dot"></span>
              ${label}
            </div>
            <div class="online-count"><i class="fas fa-users" style="opacity:0.3;margin-right:6px;"></i> ${count} 人在线</div>
          </div>

          ${playersHtml}

          <div class="motd-display">${motdHtml}</div>
        </div>
        <div class="server-updated">
          <i class="fas fa-sync-alt"></i> 更新于 ${timeStr}
          <button class="refresh-btn" onclick="fetchServerStatus()"><i class="fas fa-redo"></i> 刷新</button>
        </div>
      `;
      scheduleRefresh();
    }

    function scheduleRefresh() {
      if (serverRefreshTimer) clearTimeout(serverRefreshTimer);
      serverRefreshTimer = setTimeout(fetchServerStatus, 30000);
    }

    async function fetchServerStatus() {
      const container = document.getElementById('serverStatusContent');

      try {
        const resp = await fetch(API_BASE + '/api/mc-status');
        const data = await resp.json();

        if (data.success) {
          renderServerStatus(data);
        } else {
          throw new Error(data.error || '获取失败');
        }
      } catch (err) {
        console.warn('Worker 代理失败，尝试直连 mcsrvstat.us:', err);

        // 降级：直接从浏览器调 mcsrvstat.us
        try {
          const resp = await fetch('https://api.mcsrvstat.us/3/jssj.cc.cd');
          const data = await resp.json();
          const fbList = data.players?.list || [];
          const fbNames = fbList.length && typeof fbList[0] === 'object'
            ? fbList.map(p => p.name) : fbList;
          renderServerStatus({
            success: true,
            online: data.online || false,
            players: data.online && data.players ? {
              online: data.players.online ?? 0,
              max: data.players.max ?? 0,
              list: fbNames,
            } : { online: 0, max: 0, list: [] },
            info: data.info?.list || [],
            motd: data.motd || null,
          });
        } catch (fallbackErr) {
          console.warn('直连也失败:', fallbackErr);
          container.innerHTML = `<div class="server-status-card" style="text-align:center;padding:3rem;">
            <i class="fas fa-exclamation-triangle" style="font-size:2rem;opacity:0.2;"></i>
            <div style="margin-top:1rem;opacity:0.3;">无法获取数据</div>
            <button class="refresh-btn" onclick="fetchServerStatus()" style="margin-top:0.8rem;">重试</button>
          </div>`;
          scheduleRefresh();
        }
      }
    }

    // ============================================================
    // API 调用 - 获取帖子列表
    // ============================================================
    async function fetchForumPosts() {
      try {
        const resp = await fetch(API_BASE + '/api/posts');
        const data = await resp.json();
        if (data.success && data.posts) {
          renderPosts(data.posts);
        }
      } catch (err) {
        console.warn('获取帖子失败:', err);
      }
    }

    function renderPosts(posts) {
      const container = document.getElementById('forumPosts');
      if (!container) return;
      if (!posts || posts.length === 0) {
        container.innerHTML = `<div class="forum-post"><div class="post-excerpt" style="text-align:center; opacity:0.3;">暂无动态</div></div>`;
        return;
      }
      container.innerHTML = posts.map(post => `
        <div class="forum-post">
          <div class="post-title">
            ${post.title || '未命名'}
            ${post.pinned ? `<span class="pin-badge">置顶</span>` : ''}
          </div>
          <div class="post-meta">${post.author || '匿名'} · ${post.date || ''}</div>
          <div class="post-excerpt">${post.excerpt || post.content || ''}</div>
        </div>
      `).join('');
    }
  </script>
</body>
</html>
